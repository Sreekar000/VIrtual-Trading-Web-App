version: '3.8'

services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - JWT_SECRET=yoursecretkeyhere
      - FINNHUB_API_KEY=your_finnhub_api_key_here
      - VITE_API_BASE_URL=/api
    volumes:
      - ./backend/database.sqlite:/app/backend/database.sqlite
    restart: always

volumes:
  sqlite_data:
